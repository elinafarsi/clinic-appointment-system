version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: clinic_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      
  backend:
    build: ./clinic-backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./clinic-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend